[env:freenove_esp32_s3_wroom]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
	adafruit/Adafruit GFX Library@^1.12.6
	adafruit/Adafruit ST7735 and ST7789 Library
